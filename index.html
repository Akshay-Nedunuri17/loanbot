<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoanBot — Your AI Financial Advisor</title>
  <meta name="description" content="Chat with LoanBot, your AI-powered personal financial advisor. Discover your loan eligibility in a friendly, natural conversation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="app-shell">

    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <div class="bot-avatar">
          <span class="bot-icon">💼</span>
          <div class="pulse-ring"></div>
        </div>
        <div class="bot-meta">
          <h1>LoanBot</h1>
          <p class="status-text"><span class="dot"></span> Online • AI Financial Advisor</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="reset-btn" class="icon-btn" title="New Chat">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.29"/></svg>
        </button>
      </div>
    </header>

    <!-- Progress Steps -->
    <div class="progress-bar-wrap" id="progress-bar-wrap">
      <div class="progress-steps" id="progress-steps">
        <div class="step-item active" id="step-income">
          <div class="step-dot"><span>1</span></div>
          <div class="step-label">Income</div>
        </div>
        <div class="step-connector"></div>
        <div class="step-item" id="step-job">
          <div class="step-dot"><span>2</span></div>
          <div class="step-label">Job</div>
        </div>
        <div class="step-connector"></div>
        <div class="step-item" id="step-emi">
          <div class="step-dot"><span>3</span></div>
          <div class="step-label">EMIs</div>
        </div>
        <div class="step-connector"></div>
        <div class="step-item" id="step-expense">
          <div class="step-dot"><span>4</span></div>
          <div class="step-label">Expenses</div>
        </div>
        <div class="step-connector"></div>
        <div class="step-item" id="step-loan">
          <div class="step-dot"><span>5</span></div>
          <div class="step-label">Loan</div>
        </div>
      </div>
    </div>

    <!-- Summary Bar -->
    <div class="summary-bar" id="summary-bar" style="display:none;">
      <div class="summary-item">
        <span class="s-label">Income</span>
        <span class="s-val" id="sv-income">—</span>
        <button class="s-edit-btn" data-field="income" title="Edit">✏️</button>
      </div>
      <div class="summary-item">
        <span class="s-label">Job</span>
        <span class="s-val" id="sv-type">—</span>
        <button class="s-edit-btn" data-field="jobType" title="Edit">✏️</button>
      </div>
      <div class="summary-item">
        <span class="s-label">EMIs</span>
        <span class="s-val" id="sv-emi">—</span>
        <button class="s-edit-btn" data-field="emis" title="Edit">✏️</button>
      </div>
      <div class="summary-item">
        <span class="s-label">Expenses</span>
        <span class="s-val" id="sv-exp">—</span>
        <button class="s-edit-btn" data-field="expenses" title="Edit">✏️</button>
      </div>
      <div class="summary-item">
        <span class="s-label">Loan Ask</span>
        <span class="s-val" id="sv-amt">—</span>
        <button class="s-edit-btn" data-field="loanAmount" title="Edit">✏️</button>
      </div>
    </div>

    <!-- Chat Body -->
    <main class="chat-body" id="chat-body"></main>
 
    <!-- Dashboard Root (shown when calculation is complete) -->
    <div id="dashboard-root" class="dashboard-root" style="display:none;"></div>
 


    <!-- Quick Reply Chips -->
    <div class="chips-row" id="chips-row" style="display:none;">
    </div>

    <!-- Preferred Loan Amount Bar (shown during loan step) -->
    <div class="loan-amount-bar" id="loan-amount-bar" style="display:none;">
      <div class="loan-bar-title">💰 Your preferred loan amount</div>
      <div class="loan-amount-inputs">
        <input type="number" id="loan-amount-input" class="loan-amt-field" placeholder="e.g. 500000" min="10000" step="5000" />
        <select id="loan-type-select" class="loan-type-sel">
          <option value="personal">Personal Loan</option>
          <option value="home">Home Loan</option>
          <option value="vehicle">Car / Vehicle</option>
          <option value="business">Business Loan</option>
          <option value="education">Education Loan</option>
        </select>
        <button id="loan-confirm-btn" class="loan-confirm-btn">Confirm →</button>
      </div>
    </div>

    <!-- Footer Input -->
    <footer class="chat-footer">
      <div class="input-row">
        <textarea id="user-input" placeholder="Type your answer here…" rows="1" autocomplete="off"></textarea>
        <button id="send-btn" class="send-btn" title="Send">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="disclaimer">AI advice is informational only. Always consult a certified financial advisor.</p>
    </footer>

  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-title">Edit Value</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="modal-input" class="modal-input" placeholder="Enter new value…"/>
        <p class="modal-hint" id="modal-hint"></p>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-save" id="modal-save">Save & Recalculate</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
